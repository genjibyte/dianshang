spring:
  datasource:
    url: jdbc:h2:file:./data/order_db;AUTO_SERVER=TRUE;AUTO_SERVER_PORT=9092;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

rest-assured:
  base-uri: http://localhost
  base-path: /api
  port: 8080

# dev 环境关闭 WireMock，直接调真实服务
wiremock:
  enabled: false
  payment-gateway-port: 9090
  push-notification-port: 9091

logging:
  level:
    com.example.ordertest: INFO
